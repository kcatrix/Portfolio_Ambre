services:
  vue-app:
    image: node:lts-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  backend:
    image: node:lts-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install express && npm run dev"